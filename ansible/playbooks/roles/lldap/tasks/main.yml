---
- name: Install SSSD and LDAP packages
  ansible.builtin.apt:
    name:
      - sssd
      - sssd-tools
      - libpam-sss
      - libnss-sss
      - ldap-utils
    state: present
    update_cache: true

- name: Deploy SSSD configuration
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart sssd

- name: Enable SSSD and mkhomedir in PAM
  ansible.builtin.command: pam-auth-update --enable sssd --enable mkhomedir --force
  changed_when: false

- name: Flush handlers (restart sssd before test)
  ansible.builtin.meta: flush_handlers

- name: Verify LDAP user resolution
  ansible.builtin.command: "id {{ lldap_test_user }}"
  register: lldap_test_result
  ignore_errors: true
  changed_when: false

- name: Show LDAP user info
  ansible.builtin.debug:
    msg: "LDAP lookup result for '{{ lldap_test_user }}': {{ lldap_test_result.stdout | default('NOT FOUND') }}"

- name: Fail if LDAP user not found
  ansible.builtin.fail:
    msg: "Could not resolve LDAP user '{{ lldap_test_user }}'. Check SSSD configuration and LDAP server connectivity."
  when: lldap_test_result.rc != 0
