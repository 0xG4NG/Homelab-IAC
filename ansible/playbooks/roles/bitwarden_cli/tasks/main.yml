---
- name: Install dependencies
  ansible.builtin.package:
    name:
      - curl
      - unzip
    state: present

- name: Create temp directory
  ansible.builtin.file:
    path: "{{ bitwarden_cli_tmp_dir }}"
    state: directory
    mode: "0755"

- name: Download Bitwarden CLI
  ansible.builtin.get_url:
    url: "{{ bitwarden_cli_download_url }}"
    dest: "{{ bitwarden_cli_tmp_dir }}/bw.zip"
    mode: "0644"

- name: Unzip Bitwarden CLI
  ansible.builtin.unarchive:
    src: "{{ bitwarden_cli_tmp_dir }}/bw.zip"
    dest: "{{ bitwarden_cli_tmp_dir }}"
    remote_src: true

- name: Install bw binary to {{ bitwarden_cli_install_dir }}
  ansible.builtin.copy:
    src: "{{ bitwarden_cli_tmp_dir }}/bw"
    dest: "{{ bitwarden_cli_install_dir }}/bw"
    mode: "0755"
    remote_src: true

- name: Clean up temp directory
  ansible.builtin.file:
    path: "{{ bitwarden_cli_tmp_dir }}"
    state: absent

- name: Check installed version
  ansible.builtin.command: "{{ bitwarden_cli_install_dir }}/bw --version"
  register: bitwarden_cli_version_output
  changed_when: false

- name: Display installed version
  ansible.builtin.debug:
    msg: "Bitwarden CLI installed successfully. Version: {{ bitwarden_cli_version_output.stdout }}"
