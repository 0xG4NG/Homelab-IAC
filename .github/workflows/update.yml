name: Weekly System Update

on:
  schedule:
    - cron: "0 2 * * 0"  # Every Sunday at 02:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  update:
    name: Run system updates
    runs-on: self-hosted   # Requires a self-hosted runner with access to your homelab
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Install collections
        run: ansible-galaxy collection install -r ansible/playbooks/collections/requirements.yml

      - name: Run update playbook
        run: ansible-playbook playbooks/update.yml
        working-directory: ansible/
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
