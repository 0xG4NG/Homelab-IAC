name: CI — Lint & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible + lint
        run: |
          pip install ansible ansible-lint

      - name: Install collections
        run: |
          ansible-galaxy collection install -r ansible/playbooks/collections/requirements.yml
        working-directory: ${{ github.workspace }}

      - name: Run ansible-lint
        run: ansible-lint
        working-directory: ansible/

  terraform-validate:
    name: Terraform Validate & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform fmt check (module)
        run: terraform fmt -check -recursive
        working-directory: terraform/modules/proxmox-lxc/

      - name: Terraform fmt check (proxmox)
        run: terraform fmt -check -recursive
        working-directory: terraform/proxmox/

      - name: Terraform init (module)
        run: terraform init -backend=false
        working-directory: terraform/modules/proxmox-lxc/

      - name: Terraform validate (module)
        run: terraform validate
        working-directory: terraform/modules/proxmox-lxc/
